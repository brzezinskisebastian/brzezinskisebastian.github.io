<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sebastian Brzeziński</title>
    <!-- Dodaj link do arkusza stylów CSS z Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato&display=swap">
    <style>
        body {
            font-family: 'Lato', sans-serif; /* Ustaw czcionkę Lato dla całej strony */
            margin: 0;
            padding: 0;
        }
        .container {
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }
        .button-row {
            margin-top: 5px;
            margin-bottom: 10px; /* Zmniejszenie marginesu na dole */
            display: flex;
            justify-content: center;
        }
        .button {
            display: inline-block;
            margin: 0 5px; /* Margines wokół przycisków */
            padding: 10px 20px; /* Stałe odstępy wewnątrz przycisków */
            font-size: 14px;
            background-color: transparent;
            color: #000000;
            border: none;
            cursor: pointer;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .button:hover {
            background-color: #e4e4e4;
            border-radius: 10px;
        }
        .line {
            width: auto;
            height: 1px;
            background-color: #000000;
            margin: 10px 0; /* Zmniejszenie marginesu na górze i dole */
            border-radius: 10px;
        }
        .copyright {
            font-size: 12px;
            margin-top: 20px;
            text-align: center; /* Wyśrodkowanie tekstu */
        }
        .social-icons {
            margin-top: 10px;
            margin-bottom: 20px; /* Zwiększenie marginesu na dole */
            text-align: center; /* Wyśrodkowanie ikon */
        }
        .social-icon {
            width: 30px;
            height: 30px;
            margin: 0 5px;
            cursor: pointer;
        }
        /* Stylowanie formularza */
        form {
            margin-top: 20px;
            text-align: left; /* Wyśrodkowanie tekstu w formularzu */
        }
        form label {
            display: block; /* Każda etykieta na nowej linii */
            margin-bottom: 5px; /* Odstęp między etykietami */
        }
        form input[type="text"],
        form input[type="email"],
        form textarea {
            width: calc(100% - 22px); /* Szerokość - marginesy */
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Dopuszczalne włączenie padding i border do całkowitej szerokości */
        }
        form .submit-btn {
            text-align: center; /* Wyśrodkowanie przycisku */
        }
        form button[type="submit"] {
            background-color: transparent;
            color: rgb(0, 0, 0);
            padding: 10px 20px;
            text-align: center;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        form button[type="submit"]:hover {
            background-color: #e4e4e4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="button-row">
            <button class="button" onclick="window.location.href='https://brzezinskisebastian.github.io/index.html'">Strona Główna</button>
            <button class="button" onclick="window.location.href='https://brzezinskisebastian.github.io/HTMLPAGE/collaboration.html'">Współpraca</button>
            <button class="button" onclick="window.location.href='https://brzezinskisebastian.github.io/HTMLPAGE/apps.html'">Aplikacje</button>
            <button class="button" onclick="window.location.href='https://brzezinskisebastian.github.io/HTMLPAGE/privacy.html'">Polityka prywatności</button>
            <button class="button" onclick="window.location.href='https://brzezinskisebastian.github.io/HTMLPAGE/contacts.html'">Kontakt</button>
        </div>
        <div class="line"></div>
        <!-- Formularz -->
        <div class="container">
            <div class="text-container">
                <p>Powiedz mi co myślisz</p>
                <p>Jeżeli masz pytania, propozycje, czy inne sprawy do załatwienia, skontaktuj się za pomocą poniższego formularza. Jestem dostępny, aby odpowiedzieć na wszelkie zapytania i przyjąć Twoje sugestie.</p>
            </div>
            <form action="https://formspree.io/f/xoqgjeen" method="post">
                <label for="proposal">Informacja:</label>
                <textarea id="proposal" name="proposal" rows="8" required></textarea>

                <label for="fullName">Imię i Nazwisko:</label>
                <input type="text" id="fullName" name="fullName" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <div class="submit-btn">
                    <button type="submit" style="border: 1px solid #ccc; margin: 0 auto;">Wyślij</button>
                </div>
            </form>
        </div>
        
        <div class="copyright">
            &copy; 2024 Wszystkie prawa zastrzeżone
        </div>
        <div class="social-icons">
            <img src="https://brzezinskisebastian.github.io/HTMLPAGE/icons8-tiktok-50.png" alt="TikTok" class="social-icon">
            <img src="https://brzezinskisebastian.github.io/HTMLPAGE/icons8-twitter-50.png" alt="Twitter" class="social-icon">
            <img src="https://brzezinskisebastian.github.io/HTMLPAGE/icons8-facebook-50.png" alt="Facebook" class="social-icon">
            <!-- Dodaj kolejne ikony mediów społecznościowych tutaj -->
        </div>
    </div>
</body>

</html>
