<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>
    <link rel="stylesheet" href="styles.css"> <!-- Dodaj link do stylów CSS -->
</head>
<body>
    <h1>Logowanie</h1>
    <form id="login-form">
        <!-- Formularz logowania -->
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>
        <label for="password">Hasło:</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Zaloguj</button>
    </form>
    <!-- Odnośnik do strony rejestracji -->
    <p>Nie masz konta? <a href="register.html">Zarejestruj się</a></p>

    <!-- Import skryptu Firebase i skryptu JavaScript -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebaseConfig.js"></script>
    <script src="login.js"></script> <!-- Skrypt obsługujący logowanie -->
</body>
</html>
