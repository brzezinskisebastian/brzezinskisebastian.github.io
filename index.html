<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        #updates-list {
            max-width: 600px;
            margin: 20px auto;
            padding: 0;
            list-style-type: none;
        }
        .update {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Aktualności</h1>
    <ul id="updates-list"></ul>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js"></script>
    <script>
const firebaseConfig = {
  apiKey: "AIzaSyCJSsZKeXxo0MygqT-_XrNaLUCVIMxKXCc",
  authDomain: "aktualnosci-3f338.firebaseapp.com",
  databaseURL: "https://aktualnosci-3f338-default-rtdb.firebaseio.com",
  projectId: "aktualnosci-3f338",
  storageBucket: "aktualnosci-3f338.appspot.com",
  messagingSenderId: "1254292862",
  appId: "1:1254292862:web:630a2ed936d40dd959472f"
};
        firebase.initializeApp(firebaseConfig);

        // Pobieramy referencję do listy aktualizacji
        const updatesList = document.getElementById('updates-list');

        // Referencja do bazy danych Firebase
        const db = firebase.database();

        // Pobieramy aktualizacje z bazy danych i wyświetlamy na stronie
        db.ref('updates').on('value', snapshot => {
            updatesList.innerHTML = ''; // Czyścimy listę przed dodaniem aktualizacji
            snapshot.forEach(childSnapshot => {
                const update = childSnapshot.val();
                const updateElement = document.createElement('li');
                updateElement.classList.add('update');
                updateElement.innerHTML = `<h3>${update.title}</h3><p>${update.content}</p>`;
                updatesList.appendChild(updateElement);
            });
        });
    </script>
</body>
</html>
