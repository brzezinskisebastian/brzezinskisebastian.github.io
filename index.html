<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aktualności</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            font-size: 13px;
        }
        h1 {
            text-align: center;
            font-size: 18px;
        }
        h2 {
            font-size: 15px;
            text-align: center;
        }
        #updates-list {
            max-width: 500px;
            margin: 20px auto;
            padding: 0;
            list-style-type: none;
        }
        .update {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
        }
        form {
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            border: 0px solid #ccc;
            border-radius: 5px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Aktualności</h1>
    <ul id="updates-list"></ul>

    <h2>Dodaj nową aktualizację</h2>
    <form id="add-update-form">
    
        
        <label for="content">Treść:</label>
        <textarea id="content" name="content" rows="4" required></textarea>
        
        <button type="button" onclick="addUpdate()">Dodaj</button>
    </form>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebaseConfig.js"></script>
    <script src="displayUpdates.js"></script>
    <script src="addUpdate.js"></script>
</body>
</html>
