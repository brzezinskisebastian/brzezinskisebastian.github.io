<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xcloud</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0f13;
      --surface: #16181f;
      --surface2: #1e212b;
      --border: #2a2d3a;
      --accent: #ff8c00;
      --accent2: #ff5e00;
      --text: #e8eaf0;
      --muted: #6b7094;
      --danger: #e53e3e;
      --success: #38b28a;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== LOGIN ===== */
    #loginScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      animation: fadeIn .4s ease;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .login-logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -1px;
    }

    .login-sub {
      font-size: .85rem;
      color: var(--muted);
    }

    .pin-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: .4em;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }

    .pin-input:focus { border-color: var(--accent); }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 500;
      transition: all .15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }

    .btn-danger {
      background: var(--danger);
      color: #fff;
      font-size: .8rem;
      padding: 6px 12px;
    }

    .btn-danger:hover { filter: brightness(1.15); }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: .8rem;
      padding: 6px 12px;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

    #loginError {
      color: var(--danger);
      font-size: .85rem;
      min-height: 1em;
    }

    /* ===== APP ===== */
    #app {
      display: none;
      width: 100%;
      max-width: 820px;
      padding: 24px 16px 48px;
      animation: fadeIn .3s ease;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .app-logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: -1px;
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .8rem;
      transition: all .15s;
    }

    .logout-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 500;
      color: var(--muted);
      transition: all .2s;
      border: none;
      background: none;
      font-family: 'DM Sans', sans-serif;
    }

    .tab.active {
      background: var(--surface2);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }

    .tab:hover:not(.active) { color: var(--text); }

    .tab-icon { margin-right: 6px; }

    /* ===== PANELS ===== */
    .panel { display: none; }
    .panel.active { display: flex; flex-direction: column; gap: 16px; }

    /* ===== CHAT ===== */
    .chat-window {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      height: 480px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-window::-webkit-scrollbar { width: 4px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      animation: slideUp .2s ease;
    }

    .msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .msg-nick {
      font-size: .75rem;
      font-weight: 600;
      color: var(--accent);
      font-family: 'Space Mono', monospace;
    }

    .msg-time {
      font-size: .7rem;
      color: var(--muted);
    }

    .msg-text {
      font-size: .9rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .msg-text a {
      color: var(--accent);
      text-decoration: underline;
    }

    .chat-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-row {
      display: flex;
      gap: 10px;
    }

    .input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }

    .input:focus { border-color: var(--accent); }

    .nick-input {
      max-width: 180px;
      flex-shrink: 0;
    }

    .send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 11px 20px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      white-space: nowrap;
      transition: all .15s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--accent2); }

    .empty-state {
      color: var(--muted);
      font-size: .85rem;
      text-align: center;
      margin: auto;
    }

    /* ===== FILES ===== */
    .upload-zone {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      transition: all .2s;
      cursor: pointer;
    }

    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(255,140,0,.04);
    }

    .upload-zone-text {
      color: var(--muted);
      font-size: .9rem;
    }

    .upload-zone-text span { color: var(--accent); cursor: pointer; }

    #globalFileInput { display: none; }

    .files-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      gap: 12px;
    }

    .file-item:last-child { border-bottom: none; }
    .file-item:hover { background: var(--surface2); }

    .file-icon { font-size: 1.2rem; flex-shrink: 0; }

    .file-name {
      flex: 1;
      font-size: .9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-name a { color: var(--text); text-decoration: none; }
    .file-name a:hover { color: var(--accent); }

    .progress-bar-wrap {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width .2s;
    }

    /* ===== TEXTS ===== */
    .text-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      resize: vertical;
      outline: none;
      min-height: 130px;
      width: 100%;
      transition: border-color .2s;
    }

    .text-area:focus { border-color: var(--accent); }

    .text-actions { display: flex; gap: 10px; }

    .btn-save {
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 10px 22px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: filter .15s;
    }

    .btn-save:hover { filter: brightness(1.1); }

    .btn-clear {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 22px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-clear:hover { color: var(--text); }

    .text-entries { display: flex; flex-direction: column; gap: 12px; }

    .text-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      animation: slideUp .2s ease;
    }

    .text-entry p {
      font-size: .9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 10px;
    }

    .text-entry-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .text-entry-date {
      font-size: .75rem;
      color: var(--muted);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">✕cloud</div>
    <div class="login-sub">Podaj PIN, aby kontynuować</div>
    <input class="pin-input" type="password" id="pinInput" placeholder="••••" inputmode="numeric" maxlength="6" autocomplete="off">
    <button class="btn btn-primary" onclick="checkPin()">Zaloguj się</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <div class="app-logo">✕cloud</div>
    <button class="logout-btn" onclick="logout()">Wyloguj</button>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat', this)"><span class="tab-icon">💬</span>Czat</button>
    <button class="tab" onclick="switchTab('files', this)"><span class="tab-icon">📁</span>Pliki</button>
    <button class="tab" onclick="switchTab('texts', this)"><span class="tab-icon">📝</span>Teksty</button>
  </div>

  <!-- CHAT PANEL -->
  <div class="panel active" id="panel-chat">
    <div class="chat-window" id="chatWindow">
      <div class="empty-state" id="chatEmpty">Brak wiadomości. Napisz pierwszą!</div>
    </div>
    <div class="chat-form">
      <div class="chat-row">
        <input class="input nick-input" type="text" id="nickInput" placeholder="Twój nick" maxlength="20">
        <input class="input" type="text" id="msgInput" placeholder="Wpisz wiadomość lub wklej link..." onkeydown="if(event.key==='Enter') sendMessage()">
        <button class="send-btn" onclick="sendMessage()">Wyślij</button>
      </div>
    </div>
  </div>

  <!-- FILES PANEL -->
  <div class="panel" id="panel-files">
    <div class="upload-zone" id="uploadZone" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)" onclick="document.getElementById('globalFileInput').click()">
      <div style="font-size:2rem;margin-bottom:10px;">☁️</div>
      <div class="upload-zone-text">Przeciągnij plik tutaj lub <span>kliknij, aby wybrać</span></div>
      <input type="file" id="globalFileInput" onchange="uploadGlobalFile(this.files[0])">
      <div class="progress-bar-wrap" style="margin-top:16px;"><div class="progress-bar" id="uploadProgress"></div></div>
    </div>
    <div class="section-title">Zapisane pliki</div>
    <div class="files-list" id="filesList"><div class="empty-state" style="padding:24px">Brak plików.</div></div>
  </div>

  <!-- TEXTS PANEL -->
  <div class="panel" id="panel-texts">
    <textarea class="text-area" id="textInput" placeholder="Wpisz tekst, notatki, linki..."></textarea>
    <div class="text-actions">
      <button class="btn-save" onclick="saveText()">Zapisz</button>
      <button class="btn-clear" onclick="document.getElementById('textInput').value=''">Wyczyść</button>
    </div>
    <div class="section-title">Zapisane teksty</div>
    <div class="text-entries" id="textEntries"><div class="empty-state">Brak tekstów.</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
  const ACCESS_PIN = "3022";

  firebase.initializeApp({
    apiKey: "AIzaSyCcjh0x1odmhcz3L-w7pKhlSOzKEsZc-F4",
    authDomain: "xcloud-5fea9.firebaseapp.com",
    databaseURL: "https://xcloud-5fea9-default-rtdb.firebaseio.com/",
    projectId: "xcloud-5fea9",
    storageBucket: "xcloud-5fea9.appspot.com",
    messagingSenderId: "861473091667",
    appId: "1:861473091667:web:c28c9a8fc222292b0696a6"
  });

  const storage = firebase.storage();
  const db = firebase.database();
  let chatListener = null;

  // ====== AUTH ======
  function checkPin() {
    const pin = document.getElementById('pinInput').value.trim();
    const err = document.getElementById('loginError');
    if (!pin) { err.textContent = "Wpisz PIN."; return; }
    if (pin === ACCESS_PIN) {
      err.textContent = "";
      localStorage.setItem('xcloudLoggedIn', '1');
      showApp();
    } else {
      err.textContent = "Nieprawidłowy PIN.";
      document.getElementById('pinInput').value = "";
      document.getElementById('pinInput').focus();
    }
  }

  function logout() {
    localStorage.removeItem('xcloudLoggedIn');
    if (chatListener) db.ref('chat').off('value', chatListener);
    document.getElementById('app').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    listenChat();
    loadFiles();
    loadTexts();
  }

  window.onload = () => {
    if (localStorage.getItem('xcloudLoggedIn') === '1') {
      showApp();
    } else {
      document.getElementById('pinInput').focus();
    }
  };

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('pinInput').addEventListener('keyup', e => {
      if (e.key === 'Enter') checkPin();
    });
  });

  // ====== TABS ======
  function switchTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ====== CHAT ======
  function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
  }

  function listenChat() {
    const win = document.getElementById('chatWindow');
    const empty = document.getElementById('chatEmpty');
    chatListener = db.ref('chat').limitToLast(80).on('value', snap => {
      const data = snap.val();
      win.innerHTML = '';
      if (!data) {
        win.appendChild(empty);
        return;
      }
      Object.values(data).forEach(msg => {
        const div = document.createElement('div');
        div.className = 'msg';
        const d = new Date(msg.ts);
        const time = d.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' }) + ' ' +
                     d.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit' });
        div.innerHTML = `
          <div class="msg-header">
            <span class="msg-nick">${escHtml(msg.nick)}</span>
            <span class="msg-time">${time}</span>
          </div>
          <div class="msg-text">${linkify(msg.text)}</div>`;
        win.appendChild(div);
      });
      win.scrollTop = win.scrollHeight;
    });
  }

  function escHtml(s) {
    return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function sendMessage() {
    const nick = document.getElementById('nickInput').value.trim() || 'Anonim';
    const text = document.getElementById('msgInput').value.trim();
    if (!text) return;
    localStorage.setItem('xcloudNick', nick);
    db.ref('chat').push({ nick, text, ts: Date.now() });
    document.getElementById('msgInput').value = '';
  }

  window.addEventListener('load', () => {
    const saved = localStorage.getItem('xcloudNick');
    if (saved) document.getElementById('nickInput').value = saved;
  });

  // ====== FILES ======
  function handleDragOver(e) { e.preventDefault(); document.getElementById('uploadZone').classList.add('dragover'); }
  function handleDragLeave() { document.getElementById('uploadZone').classList.remove('dragover'); }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) uploadGlobalFile(file);
  }

  function uploadGlobalFile(file) {
    if (!file) return;
    if (file.size > 200 * 1024 * 1024) { alert('Plik zbyt duży (max 200 MB)'); return; }
    const ref = storage.ref('files/' + file.name);
    const task = ref.put(file);
    task.on('state_changed',
      snap => {
        const pct = (snap.bytesTransferred / snap.totalBytes) * 100;
        document.getElementById('uploadProgress').style.width = pct + '%';
      },
      err => { console.error(err); alert('Błąd przesyłania'); },
      () => {
        document.getElementById('uploadProgress').style.width = '0%';
        document.getElementById('globalFileInput').value = '';
        loadFiles();
      }
    );
  }

  function loadFiles() {
    const list = document.getElementById('filesList');
    list.innerHTML = '<div class="empty-state" style="padding:24px">Ładowanie...</div>';
    storage.ref('files').listAll().then(res => {
      if (res.items.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:24px">Brak plików.</div>';
        return;
      }
      list.innerHTML = '';
      res.items.forEach(async item => {
        const url = await item.getDownloadURL();
        const div = document.createElement('div');
        div.className = 'file-item';
        const ext = item.name.split('.').pop().toLowerCase();
        const icons = { jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', pdf:'📄', zip:'📦', mp4:'🎬', mp3:'🎵', doc:'📝', docx:'📝', xls:'📊', xlsx:'📊', txt:'📃' };
        const icon = icons[ext] || '📎';
        div.innerHTML = `
          <span class="file-icon">${icon}</span>
          <span class="file-name"><a href="${url}" target="_blank">${item.name}</a></span>
          <button class="btn-danger btn" onclick="deleteFile('${item.name}', this)">Usuń</button>`;
        list.appendChild(div);
      });
    }).catch(() => {
      list.innerHTML = '<div class="empty-state" style="padding:24px">Błąd ładowania.</div>';
    });
  }

  function deleteFile(name, btn) {
    if (!confirm('Usunąć plik?')) return;
    storage.ref('files/' + name).delete().then(loadFiles).catch(console.error);
  }

  // ====== TEXTS ======
  function saveText() {
    const val = document.getElementById('textInput').value.trim();
    if (!val) return alert('Wpisz tekst!');
    db.ref('texts').push({ text: val, ts: new Date().toISOString() }).then(() => {
      document.getElementById('textInput').value = '';
      loadTexts();
    });
  }

  function loadTexts() {
    const container = document.getElementById('textEntries');
    db.ref('texts').once('value').then(snap => {
      const data = snap.val();
      if (!data) { container.innerHTML = '<div class="empty-state">Brak tekstów.</div>'; return; }
      container.innerHTML = '';
      Object.entries(data).reverse().forEach(([key, entry]) => {
        const div = document.createElement('div');
        div.className = 'text-entry';
        const date = new Date(entry.ts).toLocaleString('pl-PL');
        const safe = entry.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank" style="color:var(--accent)">${url}</a>`);
        div.innerHTML = `
          <p>${safe}</p>
          <div class="text-entry-footer">
            <span class="text-entry-date">${date}</span>
            <button class="btn-danger btn" onclick="deleteText('${key}', this)">Usuń</button>
          </div>`;
        container.appendChild(div);
      });
    });
  }

  function deleteText(key) {
    if (!confirm('Usunąć ten tekst?')) return;
    db.ref('texts/' + key).remove().then(loadTexts);
  }
</script>
</body>
