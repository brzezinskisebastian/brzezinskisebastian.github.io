<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Strona</title>
    <style>
        body {
            background-color: #353541;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #353541;
        }

        nav {
            display: flex;
            justify-content: flex-end;
            padding: 10px;
            background-color: #353541;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        .logo {
            /* Dodaj styl dla logo */
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .title {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .text {
            max-width: 800px;
            text-align: center;
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #353541;
            color: white;
        }

        .hamburger-icon {
            display: none;
            cursor: pointer;
            width: 30px;
            height: 30px;
            background: url('https://brzezinskisebastian.github.io/Menu-icon.png') center/cover;
        }

        nav a {
            display: block;
        }

        nav.active a {
            display: none;
        }

        @media screen and (max-width: 768px) {
            .hamburger-icon {
                display: block;
            }

            nav a {
                display: none;
            }

            nav.active a {
                display: block;
            }

            nav {
                width: 100%;
                position: absolute;
                top: 60px;
                right: 0;
                flex-direction: column;
                background-color: #353541;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <!-- Tutaj dodaj kod dla logo -->
        </div>
        <div class="hamburger-icon" onclick="toggleMenu()"></div>
        <nav class="hamburger-menu">
            <a href="#" onclick="toggleMenu()">Główna</a>
            <a href="#" onclick="toggleMenu()">Do pobrania</a>
            <a href="#" onclick="toggleMenu()">Kontakt</a>
        </nav>
    </header>

    <main>
        <div class="title">
            Tytuł strony
        </div>
        <div class="text">
            Twój tekst znajdzie się tutaj. To pole dostosuje się do szerokości ekranu.
        </div>
    </main>

    <footer>
        &copy; 2024 Moja Strona. Wszelkie prawa zastrzeżone.
    </footer>

    <script>
        function toggleMenu() {
            const nav = document.querySelector('nav.hamburger-menu');
            nav.classList.toggle('active');
        }
    </script>

</body>
</html>
