<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Strona</title>
    <style>
        body {
            background-color: #353541;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            display: flex;
            justify-content: flex-end;
            padding: 10px;
            background-color: #353541;
        }

        nav {
            display: flex;
            justify-content: flex-end;
            padding: 10px;
            background-color: #353541;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        .logo {
            /* Dodaj styl dla logo */
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .title {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .text {
            max-width: 800px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #222a25;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Główna</a>
            <a href="#">Do pobrania</a>
            <a href="#">Kontakt</a>
        </nav>
    </header>

    <main>
        <div class="logo">
            <!-- Tutaj dodaj kod dla logo -->
        </div>
        <div class="title">
            Tytuł strony
        </div>
        <div class="text">
            Twój tekst znajdzie się tutaj. To pole dostosuje się do szerokości ekranu.
        </div>
    </main>

    <footer>
        &copy; 2024 Moja Strona. Wszelkie prawa zastrzeżone.
    </footer>

</body>
</html>
