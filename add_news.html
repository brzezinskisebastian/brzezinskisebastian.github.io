<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodaj aktualność</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link do pliku z stylerem CSS -->
</head>
<body>
    <h1>Dodaj nową aktualizację</h1>
    <form id="add-update-form">
        <label for="content">Treść:</label>
        <textarea id="content" name="content" rows="4" required></textarea>
        <button type="button" onclick="addUpdate()">Dodaj</button>
    </form>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="firebaseConfig.js"></script>
    <script src="addUpdate.js"></script>
</body>
</html>
